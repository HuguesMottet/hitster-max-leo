<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Max & Leo</title>
  
<style>
  html, body {
    height: 100%;
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;

    /* ✅ Image de fond */
    background-image: url("assets/background1.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* ✅ Voile sombre pour garder la lisibilité */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;

    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: center;
    color: white;
  }

  h1 {
    font-size: 52px;
    font-weight: 900;
    margin: 0;
  }

  button {
    font-size: 22px;
    font-weight: 900;
    padding: 16px 28px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
  }
</style>
</head>

<body>
  <div class="wrap">
    <h1>Max &amp; Leo</h1>
    <button id="play">▶ Lancer la musique</button>
    <button id="pause" style="display:none;">⏸ Pause</button>
    <audio id="audio"></audio>
  </div>
<script>
  const params = new URLSearchParams(window.location.search);
  const track = params.get("track");

  const audio = document.getElementById("audio");
  const playBtn = document.getElementById("play");
  const pauseBtn = document.getElementById("pause");

  if (!track) {
    playBtn.textContent = "❌ piste manquante";
    playBtn.disabled = true;
  } else {
    audio.src = "audio/" + track;
  }

  // ▶ Play
  playBtn.addEventListener("click", () => {
    audio.play();
    playBtn.style.display = "none";
    pauseBtn.style.display = "inline-block";
  });

  // ⏸ Pause
  pauseBtn.addEventListener("click", () => {
    audio.pause();
    pauseBtn.style.display = "none";
    playBtn.textContent = "▶ Reprendre";
    playBtn.style.display = "inline-block";
  });

  // Quand la musique se termine
  audio.addEventListener("ended", () => {
    pauseBtn.style.display = "none";
    playBtn.textContent = "▶ Rejouer";
    playBtn.style.display = "inline-block";
    audio.currentTime = 0;
  });
</script>

</body>
</html>
