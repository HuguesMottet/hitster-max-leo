<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Max & Leo</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .wrap {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 22px;
      text-align: center;
      padding: 24px;
    }
    .label {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }
    .sub {
      opacity: 0.75;
      font-size: 16px;
      max-width: 560px;
      line-height: 1.35;
    }
    .btn {
      appearance: none;
      border: 0;
      background: #fff;
      color: #000;
      font-weight: 900;
      font-size: 18px;
      padding: 16px 22px;
      border-radius: 14px;
      cursor: pointer;
      display: none;
    }
    .btn:active { transform: scale(0.98); }

    /* petit lecteur discret (optionnel) */
    audio { width: min(520px, 92vw); display: none; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="label">Max &amp; Leo</div>
    <div id="msg" class="sub">Chargement…</div>
    <button id="play" class="btn">▶ Lancer</button>
    <audio id="audio" preload="auto" playsinline></audio>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const fileId = qs.get("id"); // ex: ?id=1-z70dZo...

    const msg = document.getElementById("msg");
    const btn = document.getElementById("play");
    const audio = document.getElementById("audio");

    if (!fileId) {
      msg.textContent = "Erreur : il manque ?id= (ID Google Drive) dans l’URL.";
      return;
    }

    // 1) URL Drive (téléchargement direct). Souvent OK, mais si ça force un téléchargement
    //    sur ton téléphone, dis-le moi : je te donnerai une variante plus compatible.
    const mp3Url = "https://drive.google.com/uc?export=download&id=" + encodeURIComponent(fileId);
    audio.src = mp3Url;

    async function tryPlay() {
      try {
        msg.textContent = "Lecture…";
        await audio.play();
        btn.style.display = "none";
        msg.textContent = "▶ En lecture";
      } catch (e) {
        // Autoplay bloqué -> bouton
        msg.textContent = "Appuie sur “Lancer” (certains téléphones bloquent l’auto‑lecture).";
        btn.style.display = "inline-block";
      }
    }

    btn.addEventListener("click", () => {
      btn.style.display = "none";
      tryPlay();
    });

    // tentative auto
    tryPlay();
  </script>
</body>
</html>
