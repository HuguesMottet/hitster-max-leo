<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Max &amp; Leo</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background-image: url("assets/background2.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-align: center;
      color: white;
      padding: 24px;
      transform: translateY(10svh);
    }

    h1 { font-size: 52px; font-weight: 900; margin: 0; }

    button {
      font-size: 22px;
      font-weight: 900;
      padding: 16px 28px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <button id="play">▶ Lancer la musique</button>
    <button id="pause" style="display:none;">⏸ Pause</button>
    <h1>Max &amp; Leo</h1>
    <audio id="audio"></audio>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    
    const id = parseInt(params.get("id"), 10);
    // mapping id -> fichier
    const tracks = [
      "1965-love.mp3",
      "1966-california.mp3",
      "1967-jackson.mp3",
      "1968-vesoul.mp3",
      "1969-champs.mp3",
      "1970-cecilia.mp3",
      "1971-benjamin.mp3",
      "1972-histoire.mp3",
      "1973-maladie.mp3",
      "1975-run.mp3",
    ];

const track = Number.isInteger(id) ? tracks[id] : null;

    
    const autoplay = params.get("autoplay") === "1";

    // ✅ Masquer l’URL le plus tôt possible (et garder le slash final)
    if (window.history.replaceState) {
      const cleanUrl = window.location.origin + window.location.pathname;
      window.history.replaceState({}, document.title, cleanUrl);
    }

    const tracks = [
      "1965-love.mp3","1966-california.mp3","1967-jackson.mp3","1968-vesoul.mp3","1969-champs.mp3",
      "1970-cecilia.mp3","1971-benjamin.mp3","1972-histoire.mp3","1973-maladie.mp3","1975-run.mp3",
    ];

    const backgrounds = [
      "assets/background1.jpeg","assets/background2.jpeg","assets/background3.jpeg","assets/background4.jpeg","assets/background5.jpeg",
    ];

    if (track) {
      const i = tracks.indexOf(track);
      document.body.style.backgroundImage = `url("${i !== -1 ? backgrounds[i % backgrounds.length] : backgrounds[1]}")`;
    }

    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("play");
    const pauseBtn = document.getElementById("pause");

    if (!track) {
      playBtn.textContent = "❌ piste manquante";
      playBtn.disabled = true;
    } else {
      audio.src = "audio/" + track;
    }

    async function tryAutoplay() {
      try {
        await audio.play();
        playBtn.style.display = "none";
        pauseBtn.style.display = "inline-block";
      } catch (e) {
        playBtn.textContent = "▶ Lancer la musique";
        playBtn.style.display = "inline-block";
        pauseBtn.style.display = "none";
      }
    }

    if (track && autoplay) tryAutoplay();

    playBtn.addEventListener("click", () => {
      audio.play();
      playBtn.style.display = "none";
      pauseBtn.style.display = "inline-block";
    });

    pauseBtn.addEventListener("click", () => {
      audio.pause();
      pauseBtn.style.display = "none";
      playBtn.textContent = "▶ Reprendre";
      playBtn.style.display = "inline-block";
    });

    audio.addEventListener("ended", () => {
      pauseBtn.style.display = "none";
      playBtn.textContent = "▶ Rejouer";
      playBtn.style.display = "inline-block";
      audio.currentTime = 0;
    });
  </script>
</body>
</html>
