<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Max &amp; Leo</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;

      /* Valeur par défaut (sera remplacée par JS) */
      background-image: url("assets/background2.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* ✅ Voile sombre pour garder la lisibilité */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;

      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-align: center;
      color: white;
      padding: 24px;
    }

    h1 {
      font-size: 52px;
      font-weight: 900;
      margin: 0;
    }

    button {
      font-size: 22px;
      font-weight: 900;
      padding: 16px 28px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<div class="wrap">
  <button id="play">▶ Lancer la musique</button>
  <button id="pause" style="display:none;">⏸ Pause</button>
  <h1>Max &amp; Leo</h1>
  <audio id="audio"></audio>
</div>

  .wrap {
  transform: translateY(8vh); /* ⬅️ descend de 8% de la hauteur écran */
}

  <script>
    // --- Lecture du paramètre ?track=... ---
    const params = new URLSearchParams(window.location.search);
    const track = params.get("track"); // ex: 1965-love.mp3
    // URLSearchParams.get() est la méthode standard pour récupérer les paramètres. [3](https://developer.mozilla.org/en-US/docs/Web/API/URLSearchParams)

    // --- Méthode B : mapping "ordre des chansons" -> "ordre des fonds" ---
    const tracks = [
      "1965-love.mp3",
      "1966-california.mp3",
      "1967-jackson.mp3",
      "1968-vesoul.mp3",
      "1969-champs.mp3",
      "1970-cecilia.mp3",
      "1971-benjamin.mp3",
      "1972-histoire.mp3",
      "1973-maladie.mp3",
      "1975-run.mp3",
    ];

    // ⚠️ Remplace ces noms par TES 5 fichiers d'image réels dans /assets/
    const backgrounds = [
      "assets/background1.jpeg",
      "assets/background2.jpeg",
      "assets/background3.jpeg",
      "assets/background4.jpeg",
      "assets/background5.jpeg",
    ];

    // Applique un background selon l'ordre (i % 5)
    if (track) {
      const i = tracks.indexOf(track);
      if (i !== -1) {
        document.body.style.backgroundImage = `url("${backgrounds[i % backgrounds.length]}")`;
        // Changer backgroundImage via JS est la manière standard. [1](https://www.geeksforgeeks.org/javascript/how-to-change-background-image-in-javascript/)[2](https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Properties/background-image)
      } else {
        // Fallback si track pas dans la liste (garde background2 par défaut)
        document.body.style.backgroundImage = `url("${backgrounds[1]}")`;
      }
    }

    // --- Player Play / Pause ---
    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("play");
    const pauseBtn = document.getElementById("pause");

    if (!track) {
      playBtn.textContent = "❌ piste manquante";
      playBtn.disabled = true;
    } else {
      audio.src = "audio/" + track;
    }

    // ▶ Play
    playBtn.addEventListener("click", () => {
      audio.play();
      playBtn.style.display = "none";
      pauseBtn.style.display = "inline-block";
    });

    // ⏸ Pause
    pauseBtn.addEventListener("click", () => {
      audio.pause();
      pauseBtn.style.display = "none";
      playBtn.textContent = "▶ Reprendre";
      playBtn.style.display = "inline-block";
    });

    // Fin de piste
    audio.addEventListener("ended", () => {
      pauseBtn.style.display = "none";
      playBtn.textContent = "▶ Rejouer";
      playBtn.style.display = "inline-block";
      audio.currentTime = 0;
    });
  </script>
</body>
</html>
