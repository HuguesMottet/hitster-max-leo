<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Max & Leo</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: black;
      color: white;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-align: center;
    }
    h1 {
      font-size: 52px;
      font-weight: 900;
      margin: 0;
    }
    button {
      font-size: 22px;
      font-weight: 900;
      padding: 16px 28px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Max &amp; Leo</h1>
    <button id="play">▶ Lancer la musique</button>
    <audio id="audio"></audio>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const track = params.get("track");

    const audio = document.getElementById("audio");
    const button = document.getElementById("play");

    if (!track) {
      button.textContent = "❌ piste manquante";
      button.disabled = true;
    } else {
      audio.src = "audio/" + track;
    }

    button.addEventListener("click", () => {
      audio.play();
      button.style.display = "none";
    });
  </script>
</body>
</html>
